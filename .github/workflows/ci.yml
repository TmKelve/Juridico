name: ci

on:
  push:
    branches:
      - main
      - develop
      - "codex/**"
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: juridico_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d juridico_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/juridico_ci?schema=public
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: ci-secret-key
      VITE_API_URL: http://localhost:3000
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Validate Epic CDE docs and seed
        run: node --test backend/tests/epic-cde.docs.test.cjs backend/tests/epic-cde.seed.test.cjs
        working-directory: .

      - name: Apply Prisma migrations
        run: npm run prisma:migrate:deploy
        working-directory: backend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start backend
        run: nohup node dist/main.js > backend.log 2>&1 &
        working-directory: backend

      - name: Start frontend
        run: nohup npm run dev -- --host 0.0.0.0 > frontend.log 2>&1 &
        working-directory: frontend

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready"
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:5173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Frontend did not become ready"
          exit 1

      - name: Run smoke tests
        run: npm run test:smoke
        working-directory: frontend

      - name: Run Epic CDE smoke tests
        run: npx playwright test epic-cde.smoke.test.ts
        working-directory: frontend

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
            backend/backend.log
            frontend/frontend.log
